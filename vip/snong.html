<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SNONG</title>
<style>
  body { margin: 0; background: #1e1e1e; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { background: #1e1e1e; display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = 800, H = 600;
canvas.width = W;
canvas.height = H;

// Colors
const BG_COLOR = "#1e1e1e";
const SNAKE_GREEN = "#4CAF50";
const PADDLE_BLUE = "#2196F3";
const APPLE_RED = "#FF5252";

// Objects
let paddle = { x: W/2 - 60, y: H - 40, width: 120, height: 15 };
let snake_pos = { x: W/2, y: H/2 };
let snake_speed = { x: 5, y: -5 };
let history = [];
let snake_len = 15;
let apple = { x: Math.random()*(W-200)+100, y: Math.random()*150+50, size: 22 };

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function gameLoop() {
    // 1. Controls
    if ((keys["ArrowLeft"] || keys["a"]) && paddle.x > 0) paddle.x -= 12;
    if ((keys["ArrowRight"] || keys["d"]) && paddle.x + paddle.width < W) paddle.x += 12;

    // 2. Physics & Path Tracking
    snake_pos.x += snake_speed.x;
    snake_pos.y += snake_speed.y;

    history.unshift({ x: snake_pos.x, y: snake_pos.y });
    if (history.length > snake_len * 4) history.pop();

    // Bounces
    if (snake_pos.x <= 12 || snake_pos.x >= W - 12) snake_speed.x *= -1;
    if (snake_pos.y <= 12) snake_speed.y *= -1;

    // Collisions
    if (snake_pos.x >= paddle.x && snake_pos.x <= paddle.x + paddle.width &&
        snake_pos.y + 12 >= paddle.y && snake_pos.y - 12 <= paddle.y + paddle.height) {
        snake_speed.y = -Math.abs(snake_speed.y);
        snake_speed.x = (snake_pos.x - (paddle.x + paddle.width/2)) / 8;
    }

    if (snake_pos.x >= apple.x && snake_pos.x <= apple.x + apple.size &&
        snake_pos.y >= apple.y && snake_pos.y <= apple.y + apple.size) {
        snake_len += 5;
        apple.x = Math.random()*(W-200)+100;
        apple.y = Math.random()*150+50;
    }

    if (snake_pos.y >= H) { alert("Game Over!"); snake_pos = {x: W/2, y: H/2}; snake_len=15; history=[]; snake_speed={x:5,y:-5}; }

    // 3. Drawing
    ctx.fillStyle = BG_COLOR;
    ctx.fillRect(0, 0, W, H);

    // Snake
    if (history.length > 1) {
        ctx.strokeStyle = SNAKE_GREEN;
        ctx.lineWidth = 20;
        ctx.beginPath();
        ctx.moveTo(history[0].x, history[0].y);
        for (let i=1; i<history.length; i++) ctx.lineTo(history[i].x, history[i].y);
        ctx.stroke();
    }
    ctx.fillStyle = SNAKE_GREEN;
    ctx.beginPath();
    ctx.arc(history[0].x, history[0].y, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(history[history.length-1].x, history[history.length-1].y, 10, 0, Math.PI*2);
    ctx.fill();

    // Apple
    ctx.fillStyle = APPLE_RED;
    ctx.beginPath();
    ctx.arc(apple.x + apple.size/2, apple.y + apple.size/2, 11, 0, Math.PI*2);
    ctx.fill();

    // Paddle
    ctx.fillStyle = PADDLE_BLUE;
    ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.strokeRect(paddle.x, paddle.y, paddle.width, paddle.height);

    // Title
    ctx.fillStyle = "#646464";
    ctx.font = "24px Arial";
    ctx.fillText("SNONG", W/2-35, 30);

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
